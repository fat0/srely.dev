{{ define "main" }}
  <h1>{{ .Title }}</h1>

  <ul class="post-list">
    {{ range .Pages.ByDate.Reverse }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
        {{ with .Description }}<p class="description">{{ . }}</p>{{ end }}
      </li>
    {{ end }}
  </ul>
{{ end }}
