{{ define "main" }}
  <section id="intro">
    <h1>{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="subtitle">{{ . }}</p>{{ end }}
  </section>

  {{ .Content }}

  <section id="contact">
    <h2>Get in Touch</h2>
    <p>
      <a href="{{ .Site.Params.linkedin }}">LinkedIn</a> ·
      <a href="{{ .Site.Params.github }}">GitHub</a> ·
      <a href="mailto:{{ .Site.Params.email }}">{{ .Site.Params.email }}</a>
    </p>
  </section>
{{ end }}
